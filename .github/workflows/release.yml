name: Build release branch

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches:
      - main
    paths:
      - "source/**"
      - "scripts/**"
      - "package.json"
      - "bun.lock"
      - "source.txt"
      - ".github/workflows/release.yml"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build release output
        run: bun run build:release
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Prepare provider artifact change notification
        run: bun scripts/notify-artifact-changes.mjs --out .release-work/telegram-notification.html
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Set update note
        run: echo "COMMIT_MESSAGE=Auto Update $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')" >> "$GITHUB_ENV"

      - name: Sync source backups to main
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          if [ -z "$(git status --porcelain source)" ]; then
            echo "source/ unchanged, skip."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add source
          git commit -m "Auto Update source backups $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:main

      - name: Publish release branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: release
          publish_dir: ./.release
          force_orphan: true
          commit_message: ${{ env.COMMIT_MESSAGE }}
          enable_jekyll: true

      - name: Send provider artifact change notification
        if: hashFiles('.release-work/telegram-notification.html') != ''
        run: bun scripts/notify-artifact-changes.mjs --message-file .release-work/telegram-notification.html
        env:
          TELEGRAM_BOT_TOKEN: ${{ 6682717565:AAGV2T1fLMicCsEnbvVUbxFSHXR5G4xE3eg }}
          TELEGRAM_CHAT_ID: ${{ 469763189 }}
